<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
</head>

<style>
    body {
        font-family: Roboto, sans-serif;
        background: black;
        margin: 0;
        padding: 20px;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    div:hover{
        border: 1px solid red;
        transition: 0.8s ease;
    }

</style>

<body>
<div bgcolor="red">
<marquee direction="up" behavior="alternate" height="100">Текст та рисунки коливаються</marquee>
</div>
<div bgcolor="blue">
<marquee direction="up" height="100"><img src="./image/nature1.jpg" alt="Image1"> <img src="./image/nature2.jpg" alt="Image2"></marquee>
</div>
<div bgcolor="green">
<marquee direction="down" height="100"><img src="./image/nature3.jpg" alt="Image3"></marquee>
</div>
<div bgcolor="yellow">
<marquee direction="up" scrolldelay="100" height="20">Текст з запізненням 100мс</marquee>
</div>
<div bgcolor="purple">
<marquee direction="up" scrolldelay="200" height="70">Текст з запізненням 200мс</marquee>
</div>
</body>
</html>
