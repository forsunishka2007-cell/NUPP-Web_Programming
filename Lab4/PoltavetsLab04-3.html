<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div bgcolor="red">
<marquee direction="up" behavior="alternate" height="100">Текст та рисунки коливаються</marquee>
</div>
<div bgcolor="blue">
<marquee direction="up" height="100"><img src="./image/nature1.jpg" alt="Image1"> <img src="./image/nature2.jpg" alt="Image2"></marquee>
</div>
<div bgcolor="green">
<marquee direction="down" behavior="slide" height="100"><img src="./image/nature3.jpg" alt="Image3"> <img src="./image/nature4.jpg" alt="Image4"></marquee>
</div>
<div bgcolor="yellow">
<marquee direction="up" scrolldelay="100" height="20">Текст з запізненням 100мс</marquee>
</div>
<div bgcolor="purple">
<marquee direction="up" scrolldelay="200" height="70">Текст з запізненням 200мс</marquee>
</div>
</body>
</html>
