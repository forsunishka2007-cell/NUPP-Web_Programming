<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 4</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('./image/night3.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 80%;
            max-width: 900px;
            background-color: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);

            opacity: 0.7;
            transform: translateY(0);

            transition: all 0.6s ease-in-out;
        }

        table:hover {
            opacity: 1;
            transform: translateY(-15px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5), 
                        0 0 60px rgba(0, 212, 255, 0.2);
        }

        caption {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }
        thead tr {
            background-color: #e6f2ff;
        }

        th {
            padding: 15px;
            color: #0056b3;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-bottom: 2px solid #00d4ff;
        }

        /* Тіло таблиці */
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #333;
            transition: background 0.3s;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #f0f8ff;
        }

        tr[align="left"] td { text-align: left; }
        tr[align="center"] td { text-align: center; }
        tr[align="right"] td { text-align: right; }

        tbody tr:last-child td {
            border-bottom: none;
        }

        @media screen and (max-width: 768px) {
            table {
                width: 100%;
                opacity: 1;
            }
            th, td {
                padding: 10px 5px;
                font-size: 13px;
            }
            caption {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <table>
        <caption>Звіт про успішність групи</caption>
        <thead>
            <tr>
                <th>№</th>
                <th>Прізвище</th>
                <th>Предмет</th>
                <th>Оцінка</th>
                <th>Дата</th>
            </tr>
        </thead>
        <tbody>
            <tr align="left"><td>1</td><td>Іваненко</td><td>HTML</td><td>100</td><td>20.02</td></tr>
            <tr align="center"><td>2</td><td>Петренко</td><td>CSS</td><td>95</td><td>21.02</td></tr>
            <tr align="right"><td>3</td><td>Сидоренко</td><td>JS</td><td>90</td><td>22.02</td></tr>
            <tr align="left"><td>4</td><td>Козак</td><td>Design</td><td>88</td><td>23.02</td></tr>
            <tr align="center"><td>5</td><td>Лисиця</td><td>SQL</td><td>92</td><td>24.02</td></tr>
            <tr align="right"><td>6</td><td>Вовк</td><td>PHP</td><td>85</td><td>25.02</td></tr>
            <tr align="left"><td>7</td><td>Заєць</td><td>Python</td><td>98</td><td>26.02</td></tr>
        </tbody>
    </table>

</body>
</html>
