<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Завдання</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        table {
            border-collapse: collapse;
            width: 75%;
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border: 1px solid #ccc;
        }
        th {
            background-color: #4a90e2;
            color: white;
            font-size: 1.1em;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="2">Заголовок</th>
        </tr>
        <tr>
            <td style="width:25%;">Дані, вирівняні по лівому краю комірки</td>
            <td style="width:75%; text-align:right;">Дані, вирівняні по правому краю комірки</td>
        </tr>
        <tr>
            <td>25% ширини таблиці</td>
            <td>75% ширини таблиці</td>
        </tr>
    </table>
</body>
</html>
