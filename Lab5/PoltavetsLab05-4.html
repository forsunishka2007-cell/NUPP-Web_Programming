<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Завдання</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("./image/night.jpg");
            background-repeat: no-repeat;    
            background-size: cover;          
            background-position: center;     
            background-attachment: fixed;
            padding: 40px;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 60%;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
            border: 1px solid #ddd; 
            opacity: 0.6;
            transition: all 0.3s ease-out;
        }

        td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
            color: #444;
        }

        td:first-child {
            background-color: #e6f2ff;
            font-weight: bold;
            color: #0056b3;
            width: 50px;
        }

        table:hover{
            opacity: 1;
            box-shadow: 0 15px 40px rgba(248, 248, 248, 0.15);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6), 
                0 0 50px rgba(0, 212, 255, 0.3);

            border-color: #00d4ff;
        }

        tr:hover {
            background-color: #f1f8ff;
            transition: background-color 0.3s ease;
        }

        img {
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>№1</td><td>Елемент 1</td><td>Елемент 2</td><td>Елемент 3</td>
        </tr>
        <tr>
            <td>№2</td><td>Дані А</td><td>Дані Б</td><td>Дані В</td>
        </tr>
        <tr>
            <td>№3</td>
            <td><img src="image/nature3.jpg" width="100" height="100" alt="img"></td>
            <td>Текст</td>
            <td>Текст</td>
        </tr>
        <tr>
            <td>№4</td><td>Інфо</td><td>Інфо</td><td>Інфо</td>
        </tr>
        <tr>
            <td>№5</td><td>Кінець</td><td>Кінець</td><td>Кінець</td>
        </tr>
    </table>

</body>
</html>
